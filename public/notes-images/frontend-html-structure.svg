<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1120" height="560" rx="32" fill="url(#bg)"/>
  <text x="70" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">
    Frontend HTML 基础结构
  </text>
  <text x="70" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#64748b">
    一个最小 HTML 页面由 doctype、html、head、body 组成
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="155" width="520" height="335" rx="22" fill="#111827"/>
    <text x="100" y="205" font-family="Consolas, monospace" font-size="22" fill="#f97316">&lt;!DOCTYPE html&gt;</text>
    <text x="100" y="245" font-family="Consolas, monospace" font-size="22" fill="#93c5fd">&lt;html lang="zh-CN"&gt;</text>
    <text x="130" y="285" font-family="Consolas, monospace" font-size="22" fill="#c4b5fd">&lt;head&gt;</text>
    <text x="160" y="325" font-family="Consolas, monospace" font-size="22" fill="#e5e7eb">&lt;title&gt;我的第一个网页&lt;/title&gt;</text>
    <text x="130" y="365" font-family="Consolas, monospace" font-size="22" fill="#c4b5fd">&lt;/head&gt;</text>
    <text x="130" y="405" font-family="Consolas, monospace" font-size="22" fill="#86efac">&lt;body&gt;</text>
    <text x="160" y="445" font-family="Consolas, monospace" font-size="22" fill="#e5e7eb">&lt;h1&gt;你好，互联网&lt;/h1&gt;</text>
    <text x="130" y="485" font-family="Consolas, monospace" font-size="22" fill="#86efac">&lt;/body&gt;</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="155" width="390" height="335" rx="22" fill="white" stroke="#dbe3f0" stroke-width="2"/>
    <rect x="700" y="205" width="310" height="72" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="728" y="249" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#1d4ed8">head：页面信息</text>
    <text x="728" y="273" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">标题、编码、样式和脚本引用</text>

    <rect x="700" y="315" width="310" height="108" rx="16" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="728" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#15803d">body：页面内容</text>
    <text x="728" y="386" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">用户能看到的文字、图片、按钮</text>
  </g>

  <text x="70" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#64748b">
    注：原本 Markdown 中引用的是本地临时图片，网页无法访问；这里替换为可部署的 HTML 学习示意图。
  </text>
</svg>
